<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Trader Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #000000;
            --bg-panel: #1a1a1a;
            --primary: #ffffff;
            --green: #39ff14; /* Neon Green */
            --red: #ff003c;   /* Arcade Red */
            --yellow: #fde910;
            --blue: #00e5ff;
            --border-size: 3px;
        }

        * { 
            box-sizing: border-box; margin: 0; padding: 0; user-select: none;
            font-family: 'Press Start 2P', cursive;
        }

        body {
            background-color: var(--bg-dark); color: var(--primary);
            height: 100vh; width: 100vw; display: flex; flex-direction: column; overflow: hidden;
            /* Hiệu ứng sọc màn hình CRT mờ */
            background-image: linear-gradient(transparent 50%, rgba(255,255,255,0.05) 50%);
            background-size: 100% 4px;
        }

        /* --- BORDERS & SHADOWS KIỂU PIXEL --- */
        .pixel-box {
            background-color: var(--bg-panel);
            border: var(--border-size) solid var(--primary);
            box-shadow: 4px 4px 0px rgba(255,255,255,0.2);
            padding: 10px;
        }

        .pixel-btn {
            background-color: var(--bg-dark);
            color: var(--primary);
            border: var(--border-size) solid var(--primary);
            cursor: pointer;
            text-transform: uppercase;
            font-size: 10px;
            padding: 10px;
            box-shadow: 3px 3px 0px var(--primary);
            transition: all 0.1s;
        }
        .pixel-btn:active {
            transform: translate(3px, 3px);
            box-shadow: 0px 0px 0px var(--primary);
        }

        /* --- HUD --- */
        .hud { display: flex; flex-direction: column; gap: 10px; padding: 10px; }
        .hud-top { display: flex; justify-content: space-between; align-items: flex-end; }
        .money { font-size: 14px; color: var(--green); text-shadow: 2px 2px 0px #005500; margin-bottom: 5px; }
        .passive-income { font-size: 8px; color: var(--yellow); }
        .level { font-size: 10px; color: var(--blue); }
        
        .action-row { display: flex; gap: 10px; margin-top: 5px; }
        .btn-shop { flex: 1; background-color: var(--yellow); color: black; border-color: black; box-shadow: 3px 3px 0px #888; }
        
        /* --- BIỂU ĐỒ --- */
        .chart-area { flex: 1; position: relative; width: 100%; padding: 10px; }
        
        /* --- BẢNG ĐIỀU KHIỂN --- */
        .trading-panel { padding: 10px; display: flex; flex-direction: column; gap: 10px; }
        
        .trade-input-wrapper { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .trade-input-wrapper .pixel-btn { padding: 12px; font-size: 14px; }
        .trade-input {
            flex: 1; background: black; border: var(--border-size) solid white; color: white;
            font-size: 16px; text-align: center; padding: 10px; outline: none;
            font-family: 'Press Start 2P', cursive;
        }

        .trade-btns { display: flex; gap: 10px; }
        .btn-up { flex: 1; background-color: var(--green); color: black; border-color: black; box-shadow: 3px 3px 0px #005500; font-size: 12px;}
        .btn-down { flex: 1; background-color: var(--red); color: white; border-color: white; box-shadow: 3px 3px 0px #550000; font-size: 12px;}

        /* --- MODAL SHOP CỬA HÀNG --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 200;
            padding: 15px;
        }
        .modal-content {
            width: 100%; max-width: 400px; max-height: 80vh; overflow-y: auto;
            display: flex; flex-direction: column; gap: 15px;
        }
        .modal-header { display: flex; justify-content: space-between; font-size: 12px; color: var(--yellow); border-bottom: 2px dashed var(--yellow); padding-bottom: 10px; }
        .close-btn { background: none; border: none; color: white; font-size: 16px; cursor: pointer; }
        
        .item-card {
            display: flex; justify-content: space-between; align-items: center;
            border: 2px solid white; padding: 10px; background: #111;
        }
        .item-info { display: flex; flex-direction: column; gap: 6px; width: 65%; }
        .item-name { font-size: 10px; line-height: 1.4; color: var(--blue); }
        .item-desc { font-size: 8px; color: var(--green); }
        .item-owned { font-size: 8px; color: #888; }
        .btn-buy { width: 30%; font-size: 8px; padding: 8px; background: white; color: black; border-color: black;}

        /* --- THÔNG BÁO --- */
        #toast-container { position: absolute; top: 120px; left: 50%; transform: translateX(-50%); z-index: 100; display: flex; flex-direction: column; gap: 5px; width: 90%; pointer-events: none;}
        .toast { background-color: black; padding: 12px; font-size: 8px; line-height: 1.5; text-align: center; border: 2px solid white; box-shadow: 4px 4px 0px rgba(255,255,255,0.3); animation: slideUp 0.2s; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

    <div class="hud pixel-box">
        <div class="hud-top">
            <div>
                <div class="level" id="level-display">LV: 1</div>
                <div style="font-size: 8px; color: #888; margin-top: 5px;">STREAK: <span id="streak-display">0</span></div>
            </div>
            <div style="text-align: right;">
                <div class="money" id="balance-display">1000$</div>
                <div class="passive-income" id="income-display">+0$/giây</div>
            </div>
        </div>
        <div class="action-row">
            <button class="pixel-btn btn-shop" onclick="openShop()"><i class="fa-solid fa-cart-shopping"></i> CỬA HÀNG</button>
        </div>
    </div>

    <div class="chart-area pixel-box" style="border-top: none; border-bottom: none; box-shadow: none;">
        <canvas id="gameChart"></canvas>
    </div>

    <div class="trading-panel pixel-box">
        <div id="toast-container"></div>
        
        <div style="font-size: 10px; text-align: center; color: var(--yellow);">MÃ: PIXEL-COIN (80%)</div>
        
        <div class="trade-input-wrapper">
            <button class="pixel-btn" onclick="adjustAmount(-50)">-</button>
            <input type="number" class="trade-input" id="trade-amount" value="100" min="10">
            <button class="pixel-btn" onclick="adjustAmount(50)">+</button>
        </div>
        
        <div class="trade-btns">
            <button class="pixel-btn btn-up" onclick="executeTrade('UP')">TĂNG</button>
            <button class="pixel-btn btn-down" onclick="executeTrade('DOWN')">GIẢM</button>
        </div>
    </div>

    <div class="modal-overlay" id="shop-modal">
        <div class="modal-content pixel-box">
            <div class="modal-header">
                <span>SHOP TÀI SẢN</span>
                <button class="close-btn" onclick="closeShop()">X</button>
            </div>
            <div id="shop-list" style="display: flex; flex-direction: column; gap: 10px;">
                </div>
        </div>
    </div>

<script>
    // --- 1. DỮ LIỆU & LOCAL STORAGE ---
    const defaultData = { 
        balance: 1000, level: 1, xp: 0, xpNeeded: 100, streak: 0, baseRate: 0.80,
        assets: { miner: 0, pickaxe: 0, server: 0 } // Số lượng tài sản sở hữu
    };
    
    let gameData = JSON.parse(localStorage.getItem('pixel_trading_data')) || defaultData;
    // Cập nhật cấu trúc nếu người chơi cũ chưa có object assets
    if(!gameData.assets) gameData.assets = { miner: 0, pickaxe: 0, server: 0 };
    gameData.streak = 0; 

    // Cửa hàng vật phẩm
    const shopItems = {
        miner: { id: 'miner', name: 'Máy Đào Coin Cùi', cost: 500, income: 5, icon: 'fa-microchip' },
        pickaxe: { id: 'pickaxe', name: 'Cúp Kim Cương', cost: 2500, income: 30, icon: 'fa-hammer' },
        server: { id: 'server', name: 'Trang Trại Server', cost: 10000, income: 150, icon: 'fa-server' }
    };

    let currentPrice = 100.00;
    const tradeDuration = 5; // 5 giây

    // --- 2. CẬP NHẬT GIAO DIỆN CHUNG ---
    function saveData() { localStorage.setItem('pixel_trading_data', JSON.stringify(gameData)); }

    function getTotalIncome() {
        let total = 0;
        for (let key in shopItems) {
            total += gameData.assets[key] * shopItems[key].income;
        }
        return total;
    }

    function updateHUD() {
        document.getElementById('balance-display').innerText = Math.floor(gameData.balance) + '$';
        document.getElementById('level-display').innerText = `LV: ${gameData.level}`;
        document.getElementById('streak-display').innerText = gameData.streak;
        document.getElementById('income-display').innerText = `+${getTotalIncome()}$/giây`;
    }

    function showToast(msg, color = 'white') {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = 'toast'; toast.style.color = color; toast.style.borderColor = color;
        toast.innerText = msg;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    }

    function adjustAmount(val) {
        let input = document.getElementById('trade-amount');
        let newVal = (parseInt(input.value) || 0) + val;
        input.value = Math.max(newVal, 10);
    }

    // --- 3. LOGIC CỬA HÀNG TÀI SẢN ---
    function openShop() {
        renderShop();
        document.getElementById('shop-modal').style.display = 'flex';
    }
    function closeShop() { document.getElementById('shop-modal').style.display = 'none'; }

    function renderShop() {
        const container = document.getElementById('shop-list');
        container.innerHTML = '';
        for (let key in shopItems) {
            let item = shopItems[key];
            let owned = gameData.assets[key];
            container.innerHTML += `
                <div class="item-card">
                    <div class="item-info">
                        <div class="item-name"><i class="fa-solid ${item.icon}"></i> ${item.name}</div>
                        <div class="item-desc">+${item.income}$/giây</div>
                        <div class="item-owned">Đã có: ${owned}</div>
                    </div>
                    <button class="pixel-btn btn-buy" onclick="buyItem('${key}')">${item.cost}$</button>
                </div>
            `;
        }
    }

    function buyItem(key) {
        let item = shopItems[key];
        if (gameData.balance >= item.cost) {
            gameData.balance -= item.cost;
            gameData.assets[key]++;
            saveData();
            updateHUD();
            renderShop(); // Cập nhật lại số lượng trong shop
            showToast(`Đã mua ${item.name}!`, 'var(--green)');
        } else {
            showToast(`Thiếu tiền! Cần ${item.cost}$`, 'var(--red)');
        }
    }

    // VÒNG LẶP THU NHẬP THỤ ĐỘNG (Chạy mỗi 1 giây)
    setInterval(() => {
        let income = getTotalIncome();
        if (income > 0) {
            gameData.balance += income;
            updateHUD();
            saveData();
        }
    }, 1000);

    // --- 4. BIỂU ĐỒ PIXEL ---
    const ctx = document.getElementById('gameChart').getContext('2d');
    let priceData = Array(25).fill(currentPrice);
    
    // Cấu hình phông chữ Pixel cho trục Chart.js
    Chart.defaults.font.family = "'Press Start 2P', cursive";
    Chart.defaults.color = "#ffffff";

    const chart = new Chart(ctx, {
        type: 'line',
        data: { 
            labels: Array(25).fill(''), 
            datasets: [{ 
                data: priceData, 
                borderColor: '#39ff14', 
                borderWidth: 3, 
                stepped: true, // Chuyển đường cong thành bậc thang 8-bit
                pointRadius: 0 
            }] 
        },
        options: { 
            responsive: true, maintainAspectRatio: false, animation: { duration: 0 }, 
            scales: { 
                x: { display: false }, 
                y: { 
                    position: 'right', 
                    grid: { color: '#333' }, 
                    ticks: { font: { size: 8 } } 
                } 
            }, 
            plugins: { legend: { display: false }, tooltip: { enabled: false } } 
        }
    });

    setInterval(() => {
        currentPrice += (Math.random() * 6 - 3);
        priceData.push(currentPrice); priceData.shift();
        chart.data.datasets[0].borderColor = priceData[24] >= priceData[23] ? '#39ff14' : '#ff003c';
        chart.update();
    }, 1000);

    // --- 5. LOGIC KHỚP LỆNH ---
    function executeTrade(direction) {
        const amount = parseInt(document.getElementById('trade-amount').value);
        if (amount > gameData.balance) { showToast("KHÔNG ĐỦ TIỀN!", "var(--red)"); return; }

        gameData.balance -= amount;
        updateHUD(); saveData();
        const entryPrice = currentPrice;
        showToast("ĐANG KHỚP LỆNH...", "var(--blue)");

        setTimeout(() => {
            const exitPrice = currentPrice;
            let isWin = (direction === 'UP' && exitPrice > entryPrice) || (direction === 'DOWN' && exitPrice < entryPrice);

            if (isWin) {
                const profit = amount + (amount * gameData.baseRate);
                gameData.balance += profit;
                gameData.streak++;
                
                // Logic tăng cấp đơn giản
                gameData.xp += 40;
                if(gameData.xp >= gameData.xpNeeded) {
                    gameData.level++; gameData.xp = 0; gameData.xpNeeded *= 1.5;
                    showToast(`LEVEL UP! LV.${gameData.level}`, 'var(--yellow)');
                }
                
                showToast(`WIN! +${Math.floor(profit)}$`, "var(--green)");
            } else if (exitPrice === entryPrice) {
                gameData.balance += amount; 
                showToast("HÒA!", "white");
            } else {
                gameData.streak = 0; 
                showToast(`LOSE! -${amount}$`, "var(--red)");
            }
            
            saveData(); updateHUD();
        }, tradeDuration * 1000);
    }

    updateHUD();
</script>
</body>
</html>
