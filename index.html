<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Gacha Universe Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #050505; --bg-panel: #111111; --primary: #ffffff;
            --t1: #4b69ff; /* Blue */
            --t2: #8847ff; /* Purple */
            --t3: #d32ce6; /* Pink */
            --t4: #eb4b4b; /* Red */
            --t5: #ffd700; /* Gold */
            --up: #39ff14; --down: #ff003c;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; font-family: 'VT323', monospace; }
        body { background-color: var(--bg-dark); color: var(--primary); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

        /* --- ANIMATIONS TỐI ƯU --- */
        @keyframes slideFadeUp { 0% { opacity: 0; transform: translateY(15px); } 100% { opacity: 1; transform: translateY(0); } }
        @keyframes popIn { 0% { opacity: 0; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1); } }
        @keyframes neonGlow { 0%, 100% { text-shadow: 0 0 5px currentColor; } 50% { text-shadow: 0 0 2px currentColor; } }

        /* --- UI COMPONENTS --- */
        .pixel-btn {
            background: var(--bg-dark); color: var(--primary); border: 2px solid var(--primary);
            padding: 10px; font-size: 18px; cursor: pointer; text-transform: uppercase;
            box-shadow: 2px 2px 0px var(--primary); transition: transform 0.1s, box-shadow 0.1s; text-align: center;
        }
        .pixel-btn:active { transform: translate(2px, 2px); box-shadow: none; }
        .pixel-btn:disabled { background: #333; color: #777; border-color: #555; box-shadow: none; transform: none; cursor: not-allowed; }

        /* --- HEADER --- */
        header { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; border-bottom: 2px dashed #444; background: var(--bg-panel); z-index: 10; }
        .header-title { font-size: 22px; color: var(--t5); animation: neonGlow 2s infinite; }
        .header-balance { font-size: 24px; color: var(--up); text-shadow: 2px 2px 0px #004400; transition: transform 0.1s; }
        .header-balance.bump { transform: scale(1.1); } 

        /* --- SCREENS --- */
        .screen { display: none; flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 85px; }
        .screen.active { display: block; animation: slideFadeUp 0.2s ease-out; }

        /* --- HOME --- */
        .case-list { display: flex; flex-direction: column; gap: 20px; }
        .case-card { border: 2px solid; padding: 15px; background: #0a0a0a; display: flex; flex-direction: column; gap: 10px; text-align: center; }
        .case-title { font-size: 24px; text-shadow: 2px 2px 0px #000; }
        .case-price-tag { font-size: 16px; color: #aaa; }
        .case-preview { display: flex; justify-content: center; flex-wrap: wrap; gap: 5px; margin: 5px 0; }
        .color-dot { width: 12px; height: 12px; border: 1px solid #fff; }

        /* --- GRIDS --- */
        .grid-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .item-card { border: 2px solid #444; padding: 10px; background: #000; display: flex; flex-direction: column; justify-content: space-between; gap: 8px; animation: popIn 0.2s ease-out; }
        .item-name { font-size: 16px; line-height: 1.2; }
        .item-price { font-size: 18px; color: #fff; transition: color 0.3s; }

        /* --- QUESTS --- */
        .quest-card { border: 2px dashed #555; padding: 12px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; background: #111; }
        .quest-info { display: flex; flex-direction: column; gap: 8px; width: 65%; }
        .quest-title { font-size: 18px; color: var(--t5); }
        .btn-claim { font-size: 14px; padding: 8px; background: var(--t5); color: #000; border-color: #000; }

        /* --- MODAL TRADE --- */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; flex-direction: column; z-index: 100; padding: 15px; justify-content: center; }
        .modal.show { display: flex; }
        .modal-box { background: var(--bg-panel); border: 2px solid white; padding: 12px; display: flex; flex-direction: column; gap: 10px; }
        .modal-header { display: flex; justify-content: space-between; font-size: 18px; border-bottom: 2px solid #555; padding-bottom: 10px; align-items: center;}
        .chart-wrapper { height: 220px; width: 100%; background: #000; border: 1px solid #333; padding: 5px; position: relative; }

        /* --- MODAL QUAY GACHA (ROULETTE) --- */
        #gacha-modal { position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; background: #050505; z-index: 2000; display: none; flex-direction: column; justify-content: center; align-items: center; }
        .gacha-title { font-size: 24px; color: white; margin-bottom: 30px; text-align: center; line-height: 1.5; padding: 0 10px; }
        .roller-container { width: 100%; height: 120px; background: #111; border-top: 2px solid #333; border-bottom: 2px solid #333; position: relative; overflow: hidden; }
        .roller-center-line { position: absolute; left: 50%; top: 0; width: 4px; height: 100%; background: var(--t5); z-index: 10; transform: translateX(-50%); box-shadow: 0 0 15px var(--t5); }
        .roller-strip { display: flex; height: 100%; width: max-content; }
        .roller-item { width: 100px; height: 100px; background: #000; margin: 10px 5px; border-bottom: 6px solid; display: flex; align-items: center; justify-content: center; text-align: center; font-size: 14px; flex-shrink: 0; padding: 5px; }

        /* --- BOTTOM NAV --- */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 65px; background: var(--bg-panel); border-top: 2px solid #555; display: flex; z-index: 999; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 5px; color: #666; font-size: 14px; cursor: pointer; transition: 0.2s; }
        .nav-item.active { color: var(--primary); transform: translateY(-3px); }
        .nav-item i { font-size: 20px; transition: transform 0.2s; }
        .nav-item.active i { transform: scale(1.1); color: var(--up); text-shadow: 0 0 10px var(--up); }

        #toast-container { position: fixed; top: 70px; left: 50%; transform: translateX(-50%); z-index: 2500; display: flex; flex-direction: column; gap: 5px; width: 90%; pointer-events: none;}
        .toast { background: rgba(0,0,0,0.9); padding: 12px; font-size: 16px; text-align: center; border: 2px solid white; line-height: 1.5; box-shadow: 0 10px 20px rgba(0,0,0,0.5); transition: opacity 0.2s; }
    </style>
</head>
<body>

    <header>
        <div class="header-title" id="screen-title">CỬA HÀNG</div>
        <div class="header-balance" id="header-balance">10000.00$</div>
    </header>

    <div id="toast-container"></div>

    <div id="screen-home" class="screen active"><div class="case-list" id="case-container"></div></div>
    <div id="screen-trade" class="screen"><div class="grid-container" id="trade-grid"></div></div>
    <div id="screen-backpack" class="screen">
        <div style="display: flex; justify-content: space-between; font-size: 16px; margin-bottom: 15px; color: #aaa;">
            <span>SỐ LƯỢNG: <span id="bp-count">0</span></span>
            <span>TỔNG: <span id="bp-value" style="color:var(--up)">0.00$</span></span>
        </div>
        <div class="grid-container" id="backpack-grid"></div>
    </div>
    <div id="screen-quest" class="screen"><div id="quest-container"></div></div>
    <div id="screen-profile" class="screen">
        <div style="text-align: center; margin-bottom: 25px;">
            <i class="fa-solid fa-user-astronaut" style="font-size: 50px; color: var(--t5); margin-bottom: 10px;"></i>
        </div>
        <div style="border-bottom: 2px dashed #333; padding: 15px 0; display: flex; justify-content: space-between; font-size: 18px;"><span>SỐ DƯ</span><span id="prof-balance" style="color: var(--up)">0$</span></div>
        <div style="border-bottom: 2px dashed #333; padding: 15px 0; display: flex; justify-content: space-between; font-size: 18px;"><span>GIÁ TRỊ KHO</span><span id="prof-inv-value">0$</span></div>
        <div style="border-bottom: 2px dashed #333; padding: 15px 0; display: flex; justify-content: space-between; font-size: 18px;"><span>HÒM ĐÃ MỞ</span><span id="prof-cases">0</span></div>
        <button class="pixel-btn" style="width: 100%; margin-top: 30px; border-color: var(--down); color: var(--down);" onclick="resetGame()">XÓA DỮ LIỆU</button>
    </div>

    <div class="modal" id="trade-modal">
        <div class="modal-box">
            <div class="modal-header">
                <span id="modal-item-name">ITEM</span>
                <button class="pixel-btn" style="padding: 5px 12px;" onclick="closeModal()">X</button>
            </div>
            <div class="chart-wrapper"><canvas id="itemChart"></canvas></div>
            <div style="text-align: center; font-size: 18px; margin: 10px 0;">GIÁ HIỆN TẠI: <span id="modal-item-price" style="color: var(--up);">0$</span></div>
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button class="pixel-btn" style="flex: 1; background: var(--up); color: #000;" id="btn-modal-buy">MUA VÀO</button>
                <button class="pixel-btn" style="flex: 1; background: var(--down); color: #fff;" id="btn-modal-sell">BÁN RA</button>
            </div>
        </div>
    </div>

    <div id="gacha-modal">
        <div class="gacha-title" id="gacha-title">ĐANG QUAY...</div>
        <div class="roller-container">
            <div class="roller-center-line"></div>
            <div class="roller-strip" id="roller-strip">
                </div>
        </div>
        <button class="pixel-btn" id="btn-close-gacha" style="margin-top: 40px; display: none; padding: 15px 30px; font-size: 20px;" onclick="closeGachaModal()">TIẾP TỤC</button>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('home')"><i class="fa-solid fa-box-open"></i><span>HOME</span></div>
        <div class="nav-item" onclick="switchTab('trade')"><i class="fa-solid fa-chart-line"></i><span>TRADE</span></div>
        <div class="nav-item" onclick="switchTab('backpack')"><i class="fa-solid fa-suitcase"></i><span>KHO ĐỒ</span></div>
        <div class="nav-item" onclick="switchTab('quest')"><i class="fa-solid fa-scroll"></i><span>NHIỆM VỤ</span></div>
        <div class="nav-item" onclick="switchTab('profile')"><i class="fa-solid fa-user"></i><span>HỒ SƠ</span></div>
    </nav>

<script>
    // --- CẤU HÌNH BIẾN MÀU & DATABASE ---
    const tColors = {1:"#4b69ff", 2:"#8847ff", 3:"#d32ce6", 4:"#eb4b4b", 5:"#ffd700"};
    const cUP = "#39ff14"; const cDOWN = "#ff003c";

    const rawItems = [
        {n:"P250 Sand Dune", p:2, t:1},{n:"Glock Death Rattle", p:3, t:1},{n:"MAC-10 Indigo", p:4, t:1},{n:"MP7 Army Recon", p:5, t:1},{n:"UMP Scorched", p:6, t:1},{n:"Nova Walnut", p:7, t:1},{n:"SG553 Army", p:8, t:1},{n:"AUG Storm", p:9, t:1},{n:"FAMAS Cyan", p:10, t:1},{n:"Galil Sage", p:11, t:1},{n:"M249 Contrast", p:12, t:1},{n:"Negev Terrain", p:13, t:1},{n:"G3SG1 Desert", p:14, t:1},{n:"P90 Sand Spray", p:15, t:1},{n:"XM1014 Grass", p:16, t:1},
        {n:"USP-S Guardian", p:20, t:2},{n:"Deagle Meteorite", p:25, t:2},{n:"M4A1-S Boreal", p:30, t:2},{n:"AWP Safari", p:35, t:2},{n:"P90 Ash Wood", p:40, t:2},{n:"CZ75 Twist", p:45, t:2},{n:"Dual Berettas", p:50, t:2},{n:"Five-SeveN Forest", p:55, t:2},{n:"P2000 Granite", p:60, t:2},{n:"XM1014 Spruce", p:65, t:2},{n:"MAC-10 Candy", p:70, t:2},{n:"Bizon Urban", p:75, t:2},{n:"SSG 08 Acid", p:80, t:2},
        {n:"M4A4 Dragon King", p:100, t:3},{n:"AWP Worm God", p:120, t:3},{n:"AK-47 Elite Build", p:150, t:3},{n:"Glock Water", p:180, t:3},{n:"M4A1-S Guardian", p:200, t:3},{n:"USP-S Cortex", p:250, t:3},{n:"Deagle Conspiracy", p:300, t:3},{n:"P250 Muertos", p:350, t:3},{n:"CZ75 Yellow", p:400, t:3},{n:"Five-SeveN Monkey", p:450, t:3},
        {n:"AK-47 Redline", p:800, t:4},{n:"AWP Asiimov", p:1200, t:4},{n:"M4A4 Howl", p:2000, t:4},{n:"M4A1-S Cyrex", p:1500, t:4},{n:"USP-S Kill", p:1800, t:4},{n:"Deagle Blaze", p:2500, t:4},{n:"Glock Fade", p:3000, t:4},
        {n:"★ Karambit Fade", p:8000, t:5},{n:"★ Butterfly", p:10000, t:5},{n:"★ M9 Bayonet", p:9500, t:5},{n:"★ Gloves Vice", p:15000, t:5},{n:"★ AWP Gungnir", p:25000, t:5}
    ];
    
    const tWeights = {1: 70, 2: 20, 3: 8, 4: 1.5, 5: 0.5};

    const caseNames = ["Chroma", "Gamma", "Spectrum", "Clutch", "Danger Zone", "Prisma", "Fracture", "Snakebite", "Dreams", "Recoil", "Revolution", "CS20", "Horizon", "Glove", "Shadow", "Falchion", "Huntsman", "Winter", "Bravo", "Weapon 1"];
    const casesDB = caseNames.map((name, i) => {
        const pool = [];
        for(let t=1; t<=5; t++) {
            let tierItems = rawItems.filter(x => x.t === t);
            let picked = tierItems[i % tierItems.length]; 
            pool.push({ n: picked.n, c: tColors[t], p: picked.p, t: t, w: tWeights[t] });
            if(t === 1) { 
                let picked2 = tierItems[(i+1) % tierItems.length];
                pool.push({ n: picked2.n, c: tColors[t], p: picked2.p, t: t, w: tWeights[t] });
            }
        }
        let price = Math.floor(Math.random() * 150 + 50) + (i > 10 ? 300 : 0) + (i > 15 ? 1000 : 0);
        return { id: 'c' + i, name: 'HÒM ' + name.toUpperCase(), price: price, color: (i % 2 === 0 ? '#aaa' : '#fff'), pool: pool };
    });

    const marketItemsDB = rawItems.map(item => ({ id: 'item_' + item.n.replace(/\s/g, ''), n: item.n, c: tColors[item.t], baseP: item.p, t: item.t }));

    const questsDB = [
        { id: 'q1', title: 'Tập sự: Mở 5 hòm', target: 5, reward: 500 },
        { id: 'q2', title: 'Tân binh: Mở 20 hòm', target: 20, reward: 2500 },
        { id: 'q3', title: 'Tay chơi: Mở 50 hòm', target: 50, reward: 8000 },
        { id: 'q4', title: 'Dân chuyên: Mở 100 hòm', target: 100, reward: 20000 },
        { id: 'q5', title: 'Thương gia: Mở 250 hòm', target: 250, reward: 60000 },
        { id: 'q6', title: 'Đại gia: Mở 500 hòm', target: 500, reward: 150000 }
    ];

    let player = JSON.parse(localStorage.getItem('pixelGachaX')) || { balance: 10000.00, casesOpened: 0, inventory: [], questClaimed: [] };
    function saveGame() { localStorage.setItem('pixelGachaX', JSON.stringify(player)); updateHeaderBalance(); }
    function resetGame() { if(confirm("Xóa dữ liệu chơi?")) { localStorage.removeItem('pixelGachaX'); location.reload(); } }

    let marketHistory = [];
    let currentMultiplier = 1.000;
    for(let i=0; i<30; i++) { marketHistory.push(currentMultiplier); currentMultiplier *= (1 + (Math.random()*6-3)/100); }

    setInterval(() => {
        currentMultiplier *= (1 + (Math.random() * 6 - 3) / 100);
        if (currentMultiplier < 0.1) currentMultiplier = 0.1;
        marketHistory.push(currentMultiplier); marketHistory.shift();

        if(document.getElementById('screen-trade').classList.contains('active')) updateTradePrices();
        if(document.getElementById('screen-backpack').classList.contains('active')) updateBackpackPrices();
        if(currentActiveTradeItem && document.getElementById('trade-modal').classList.contains('show')) updateModalLivePrice();
    }, 1500);

    function updateTradePrices() {
        marketItemsDB.forEach(item => {
            const el = document.getElementById(`trade-p-${item.id}`);
            if(el) el.innerText = (item.baseP * currentMultiplier).toFixed(2) + '$';
        });
    }

    function updateBackpackPrices() {
        let total = 0;
        player.inventory.forEach(item => {
            const price = item.baseP * currentMultiplier; total += price;
            const el = document.getElementById(`bp-p-${item.id}`);
            if(el) el.innerText = price.toFixed(2) + '$';
        });
        document.getElementById('bp-value').innerText = total.toFixed(2) + '$';
    }

    // --- LOGIC GIAO DIỆN CHUNG ---
    function switchTab(tabId) {
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        event.currentTarget.classList.add('active');
        document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
        document.getElementById(`screen-${tabId}`).classList.add('active');
        
        const titles = { home: 'CỬA HÀNG', trade: 'SÀN GIAO DỊCH', backpack: 'TÚI ĐỒ', quest: 'NHIỆM VỤ', profile: 'HỒ SƠ' };
        document.getElementById('screen-title').innerText = titles[tabId];

        if (tabId === 'backpack') renderBackpack();
        if (tabId === 'quest') renderQuests();
        if (tabId === 'profile') renderProfile();
    }

    function showToast(msg, color = 'white') {
        const c = document.getElementById('toast-container');
        const t = document.createElement('div');
        t.className = 'toast'; t.style.borderColor = color; t.innerHTML = msg;
        c.appendChild(t);
        setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 200); }, 2000);
    }

    function updateHeaderBalance() { 
        const balEl = document.getElementById('header-balance');
        balEl.innerText = player.balance.toFixed(2) + '$'; 
        balEl.classList.remove('bump'); void balEl.offsetWidth; balEl.classList.add('bump');
    }

    function renderHome() {
        const container = document.getElementById('case-container');
        container.innerHTML = '';
        casesDB.forEach(c => {
            let dots = c.pool.map(p => `<div class="color-dot" style="background:${p.c}"></div>`).join('');
            container.innerHTML += `
                <div class="case-card" id="card-${c.id}" style="border-color: ${c.color}">
                    <div class="case-title" style="color: ${c.color}">${c.name}</div>
                    <div class="case-price-tag">Giá: ${c.price}$</div>
                    <div class="case-preview">${dots}</div>
                    <button class="pixel-btn" style="background: var(--t5); color: #000; border-color:#000;" onclick="openCaseAnimation('${c.id}')">MỞ HÒM</button>
                </div>
            `;
        });
    }

    // --- HỆ THỐNG ANIMATION ROULETTE CS:GO ---
    function openCaseAnimation(caseId) {
        const c = casesDB.find(x => x.id === caseId);
        if (player.balance < c.price) { showToast('KHÔNG ĐỦ TIỀN!', cDOWN); return; }

        // Trừ tiền ngay lập tức
        player.balance -= c.price;
        player.casesOpened++;
        updateHeaderBalance();

        // 1. Thuật toán chọn đồ
        let rand = Math.random() * 100, cum = 0, pulledItem = c.pool[0];
        for (let p of c.pool) { cum += p.w; if (rand <= cum) { pulledItem = p; break; } }

        // 2. Setup Modal
        const modal = document.getElementById('gacha-modal');
        const strip = document.getElementById('roller-strip');
        const btnClose = document.getElementById('btn-close-gacha');
        const title = document.getElementById('gacha-title');
        
        title.innerText = "ĐANG QUAY...";
        title.style.color = "white";
        title.style.textShadow = "none";
        btnClose.style.display = 'none';
        strip.style.transition = 'none';
        strip.style.transform = 'translateX(0)';

        // 3. Tạo 60 ô vật phẩm (Ô thứ 50 sẽ là ô trúng thưởng)
        let html = '';
        const winningIndex = 50;
        const itemWidth = 110; // CSS: 100px width + 10px margin (5px trái + 5px phải)

        for(let i=0; i<60; i++) {
            let tempItem;
            if(i === winningIndex) {
                tempItem = pulledItem;
            } else {
                // Random filler items
                let r = Math.random() * 100, c_temp = 0;
                for (let p of c.pool) { c_temp += p.w; if (r <= c_temp) { tempItem = p; break; } }
            }
            html += `<div class="roller-item" style="border-color: ${tempItem.c}; color: ${tempItem.c}">${tempItem.n}</div>`;
        }
        strip.innerHTML = html;
        modal.style.display = 'flex';

        // 4. Kích hoạt hiệu ứng trượt gia tốc
        setTimeout(() => {
            const screenCenter = window.innerWidth / 2;
            // Độ lệch random (± 40px) để vạch không dừng chính giữa hoàn hảo
            const randomOffset = Math.floor(Math.random() * 80) - 40; 
            const stopPosition = (winningIndex * itemWidth) + (itemWidth / 2) - screenCenter + randomOffset;

            // Áp dụng Cubic-Bezier: Chạy cực nhanh lúc đầu, giảm tốc từ từ lúc sau
            strip.style.transition = 'transform 6s cubic-bezier(0.15, 0.9, 0.15, 1)';
            strip.style.transform = `translateX(-${stopPosition}px)`;

            // 5. Kết thúc vòng quay
            setTimeout(() => {
                title.innerHTML = `BẠN NHẬN ĐƯỢC:<br>${pulledItem.n}`;
                title.style.color = pulledItem.c;
                title.style.textShadow = `0 0 10px ${pulledItem.c}`;
                btnClose.style.display = 'block';

                // Lưu vào kho đồ
                player.inventory.unshift({ id: Date.now() + Math.random(), n: pulledItem.n, c: pulledItem.c, baseP: pulledItem.p, t: pulledItem.t });
                saveGame();
            }, 6200); // 6s transition + 200ms an toàn
        }, 50); // Delay 50ms cho DOM kịp render
    }

    function closeGachaModal() {
        document.getElementById('gacha-modal').style.display = 'none';
        if(document.getElementById('screen-quest').classList.contains('active')) renderQuests();
    }

    function renderTradeMarket() {
        const container = document.getElementById('trade-grid');
        container.innerHTML = '';
        marketItemsDB.forEach(item => {
            const livePrice = item.baseP * currentMultiplier;
            container.innerHTML += `
                <div class="item-card" style="border-top: 4px solid ${item.c}; cursor:pointer;" onclick="openTradeModal('${item.id}')">
                    <div class="item-name" style="color: ${item.c}">${item.n}</div>
                    <div class="item-price" id="trade-p-${item.id}">${livePrice.toFixed(2)}$</div>
                </div>
            `;
        });
    }

    function renderBackpack() {
        const container = document.getElementById('backpack-grid');
        container.innerHTML = '';
        document.getElementById('bp-count').innerText = player.inventory.length;

        player.inventory.forEach(item => {
            const livePrice = item.baseP * currentMultiplier;
            container.innerHTML += `
                <div class="item-card" style="border-top: 4px solid ${item.c};">
                    <div class="item-name" style="color: ${item.c}">${item.n}</div>
                    <div class="item-price" id="bp-p-${item.id}">${livePrice.toFixed(2)}$</div>
                    <button class="pixel-btn" style="margin-top:8px; padding: 8px; font-size:14px;" onclick="sellBackpackItem(${item.id})">BÁN</button>
                </div>
            `;
        });
        updateBackpackPrices(); 
    }

    function sellBackpackItem(id) {
        const idx = player.inventory.findIndex(i => i.id === id);
        if (idx > -1) {
            const livePrice = player.inventory[idx].baseP * currentMultiplier;
            player.balance += livePrice; player.inventory.splice(idx, 1);
            saveGame(); renderBackpack(); showToast(`ĐÃ BÁN +${livePrice.toFixed(2)}$`, cUP);
        }
    }

    function renderQuests() {
        const container = document.getElementById('quest-container');
        container.innerHTML = '';
        questsDB.forEach((q) => {
            let isClaimed = player.questClaimed.includes(q.id);
            let prog = Math.min((player.casesOpened / q.target) * 100, 100);
            let btnHTML = isClaimed ? `<button class="pixel-btn" disabled style="font-size:14px; padding:8px;">XONG</button>` 
                        : (player.casesOpened >= q.target ? `<button class="pixel-btn btn-claim" onclick="claimQuest('${q.id}', ${q.reward})">NHẬN ${q.reward}$</button>` 
                        : `<div style="font-size:16px; color:#888;">${player.casesOpened}/${q.target}</div>`);

            container.innerHTML += `
                <div class="quest-card">
                    <div class="quest-info">
                        <div class="quest-title" style="${isClaimed ? 'color:#555' : ''}">${q.title}</div>
                        <div style="width:100%; height:12px; background:#000; border:1px solid #555;"><div style="height:100%; background:${isClaimed ? '#555' : 'var(--up)'}; width:${prog}%"></div></div>
                    </div>
                    <div>${btnHTML}</div>
                </div>
            `;
        });
    }

    function claimQuest(qid, reward) {
        if (!player.questClaimed.includes(qid)) {
            player.questClaimed.push(qid); player.balance += reward;
            saveGame(); renderQuests(); showToast(`NHẬN THƯỞNG +${reward}$`, cUP);
        }
    }

    function renderProfile() {
        document.getElementById('prof-balance').innerText = player.balance.toFixed(2) + '$';
        document.getElementById('prof-cases').innerText = player.casesOpened;
        let invVal = player.inventory.reduce((sum, i) => sum + (i.baseP * currentMultiplier), 0);
        document.getElementById('prof-inv-value').innerText = invVal.toFixed(2) + '$';
    }

    Chart.defaults.font.family = "'VT323', monospace"; Chart.defaults.color = "#aaaaaa";
    let modalChartInstance = null; let currentActiveTradeItem = null;

    function drawChart(item) {
        const ctx = document.getElementById('itemChart').getContext('2d');
        const itemHistory = marketHistory.map(m => m * item.baseP);

        if (modalChartInstance) modalChartInstance.destroy();
        modalChartInstance = new Chart(ctx, {
            type: 'line',
            data: { labels: Array(30).fill(''), datasets: [{ data: itemHistory, borderColor: item.c, borderWidth: 3, tension: 0, pointRadius: 0 }] },
            options: { responsive: true, maintainAspectRatio: false, animation: { duration: 0 }, scales: { x: { display: false }, y: { position: 'right', grid: { color: '#333' }, ticks: { font: { size: 14 } } } }, plugins: { legend: { display: false }, tooltip: { enabled: false } } }
        });
    }

    function openTradeModal(itemId) {
        currentActiveTradeItem = marketItemsDB.find(i => i.id === itemId);
        document.getElementById('modal-item-name').innerText = currentActiveTradeItem.n;
        document.getElementById('modal-item-name').style.color = currentActiveTradeItem.c;
        
        const modal = document.getElementById('trade-modal');
        modal.style.display = 'flex';
        requestAnimationFrame(() => {
            modal.classList.add('show'); drawChart(currentActiveTradeItem); updateModalLivePrice();
        });
        document.getElementById('btn-modal-buy').onclick = () => buyMarketItem(currentActiveTradeItem);
        document.getElementById('btn-modal-sell').onclick = () => sellMarketItem(currentActiveTradeItem);
    }

    function closeModal() { 
        document.getElementById('trade-modal').classList.remove('show'); 
        setTimeout(() => { document.getElementById('trade-modal').style.display = 'none'; currentActiveTradeItem = null; }, 100); 
    }

    function updateModalLivePrice() {
        if(!currentActiveTradeItem) return;
        const livePrice = currentActiveTradeItem.baseP * currentMultiplier;
        document.getElementById('modal-item-price').innerText = livePrice.toFixed(2) + '$';
        
        if(modalChartInstance) {
            const itemHistory = marketHistory.map(m => m * currentActiveTradeItem.baseP);
            modalChartInstance.data.datasets[0].data = itemHistory;
            modalChartInstance.data.datasets[0].borderColor = itemHistory[29] >= itemHistory[28] ? cUP : cDOWN;
            modalChartInstance.update();
        }
    }

    function buyMarketItem(item) {
        const livePrice = item.baseP * currentMultiplier;
        if(player.balance >= livePrice) {
            player.balance -= livePrice;
            player.inventory.unshift({ id: Date.now() + Math.random(), n: item.n, c: item.c, baseP: item.baseP, t: item.t });
            saveGame(); showToast(`ĐÃ MUA:<br>${item.n}`, cUP);
        } else { showToast('KHÔNG ĐỦ TIỀN MẶT!', cDOWN); }
    }

    function sellMarketItem(item) {
        const idx = player.inventory.findIndex(i => i.n === item.n);
        if(idx > -1) {
            const livePrice = player.inventory[idx].baseP * currentMultiplier;
            player.balance += livePrice; player.inventory.splice(idx, 1);
            saveGame(); showToast(`ĐÃ BÁN:<br>${item.n}`, cUP);
        } else { showToast('BẠN CHƯA CÓ<br>MÓN ĐỒ NÀY!', cDOWN); }
    }

    updateHeaderBalance(); renderHome(); renderTradeMarket();
</script>
</body>
</html>
