<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Giao diện Mô phỏng OT</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* --- THIẾT LẬP MÀU SẮC ĐẶC TRƯNG --- */
        :root {
            --bg-base: #11131a;      /* Sidebar & Header */
            --bg-main: #1a1d27;      /* Khu vực biểu đồ */
            --bg-panel: #232733;     /* Bảng đặt lệnh */
            --text-main: #ffffff;
            --text-muted: #8a90a2;
            --green: #00b061;
            --red: #ff3e4b;
            --accent: #2196f3;
            --border: #2c313f;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Roboto', 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden; /* Giao diện App, không cuộn */
        }

        /* --- THANH ĐIỀU HƯỚNG TRÁI (SIDEBAR) --- */
        .sidebar {
            width: 64px;
            background-color: var(--bg-base);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
            z-index: 10;
        }
        .nav-item {
            width: 48px;
            height: 48px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-muted);
            border-radius: 8px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 20px;
        }
        .nav-item:hover, .nav-item.active {
            background-color: var(--bg-panel);
            color: var(--text-main);
        }

        /* --- KHU VỰC CHÍNH --- */
        .main-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* --- THANH TRÊN (HEADER) --- */
        .topbar {
            height: 60px;
            background-color: var(--bg-base);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }
        .asset-selector {
            background-color: var(--bg-panel);
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
        .asset-selector span { color: var(--green); }
        
        .account-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .demo-badge {
            background-color: rgba(255, 255, 255, 0.1);
            color: var(--text-muted);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
        }
        .balance { font-size: 18px; font-weight: bold; letter-spacing: 0.5px;}
        .btn-deposit {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        /* --- KHU VỰC BIỂU ĐỒ & ĐẶT LỆNH --- */
        .content-area {
            flex: 1;
            display: flex;
            background-color: var(--bg-main);
            position: relative;
        }

        .chart-section {
            flex: 1;
            padding: 20px;
            position: relative;
        }
        .current-price-tag {
            position: absolute;
            right: 20px;
            top: 50%;
            background-color: var(--accent);
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 14px;
            z-index: 5;
            display: none; /* Ẩn tạm, Chart.js sẽ xử lý trục Y */
        }

        /* Bảng đặt lệnh bên phải */
        .trading-panel {
            width: 280px;
            background-color: var(--bg-panel);
            border-left: 1px solid var(--border);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .input-group {
            background-color: var(--bg-main);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .input-group label {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 5px;
        }
        .input-group input {
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 20px;
            font-weight: bold;
            outline: none;
            width: 100%;
        }
        .stepper {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            gap: 10px;
        }
        .stepper i { color: var(--text-muted); cursor: pointer; }
        .stepper i:hover { color: var(--text-main); }

        .payout-info {
            display: flex;
            justify-content: space-between;
            color: var(--text-muted);
            font-size: 14px;
            padding: 0 5px;
        }
        .payout-info strong { color: var(--green); font-size: 16px; }

        .btn-trade {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: opacity 0.2s;
        }
        .btn-trade:active { transform: scale(0.98); }
        .btn-trade:hover { opacity: 0.9; }
        .btn-up { background-color: var(--green); margin-bottom: 15px; }
        .btn-down { background-color: var(--red); }

        /* Danh sách lệnh đang mở */
        .open-trades {
            margin-top: auto;
            border-top: 1px solid var(--border);
            padding-top: 15px;
        }
        .trade-item {
            background-color: var(--bg-main);
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 10px;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .trade-item .timer { font-family: monospace; font-size: 14px; }

        /* --- RESPONSIVE CHO ĐIỆN THOẠI --- */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: 50px; flex-direction: row; justify-content: space-around; border-right: none; border-bottom: 1px solid var(--border); padding-top: 0; }
            .nav-item { margin-bottom: 0; height: 100%; }
            .content-area { flex-direction: column; }
            .chart-section { flex: 1; min-height: 250px; }
            .trading-panel { width: 100%; height: auto; border-left: none; border-top: 1px solid var(--border); padding: 15px; gap: 15px; flex-direction: row; flex-wrap: wrap; }
            .input-group { flex: 1; min-width: 45%; }
            .action-buttons { width: 100%; display: flex; gap: 10px; }
            .btn-trade { margin-bottom: 0; padding: 15px; }
            .open-trades { width: 100%; margin-top: 0; }
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="nav-item active"><i class="fa-solid fa-chart-line"></i></div>
        <div class="nav-item"><i class="fa-solid fa-clock-rotate-left"></i></div>
        <div class="nav-item"><i class="fa-solid fa-trophy"></i></div>
        <div class="nav-item"><i class="fa-solid fa-circle-question"></i></div>
    </nav>

    <div class="main-wrapper">
        <header class="topbar">
            <div class="asset-selector">
                <i class="fa-brands fa-bitcoin"></i> Bitcoin <span>82%</span> <i class="fa-solid fa-chevron-down" style="color:var(--text-muted); font-size:12px;"></i>
            </div>
            <div class="account-info">
                <div style="text-align: right;">
                    <span class="demo-badge">Tài khoản Demo</span>
                    <div class="balance" id="account-balance">10,000.00 D</div>
                </div>
                <button class="btn-deposit">Thanh toán</button>
            </div>
        </header>

        <div class="content-area">
            <div class="chart-section">
                <canvas id="otChart"></canvas>
            </div>

            <aside class="trading-panel">
                <div style="display: flex; width: 100%; gap: 10px; flex-wrap: wrap;">
                    <div class="input-group" style="flex: 1;">
                        <label>Số tiền</label>
                        <input type="number" id="trade-amount" value="100" min="1">
                        <div class="stepper">
                            <i class="fa-solid fa-minus" onclick="adjustAmount(-10)"></i>
                            <i class="fa-solid fa-plus" onclick="adjustAmount(10)"></i>
                        </div>
                    </div>
                    <div class="input-group" style="flex: 1;">
                        <label>Thời gian</label>
                        <input type="text" value="00:10" readonly style="font-size: 18px;">
                    </div>
                </div>

                <div class="payout-info">
                    <span>Lợi nhuận</span>
                    <strong id="potential-payout">+82.00 D</strong>
                </div>

                <div class="action-buttons">
                    <button class="btn-trade btn-up" onclick="executeTrade('UP')">
                        <span>TĂNG</span>
                        <i class="fa-solid fa-arrow-up"></i>
                    </button>
                    <button class="btn-trade btn-down" onclick="executeTrade('DOWN')">
                        <span>GIẢM</span>
                        <i class="fa-solid fa-arrow-down"></i>
                    </button>
                </div>

                <div class="open-trades">
                    <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 10px;">LỆNH ĐANG MỞ (<span id="open-count">0</span>)</div>
                    <div id="trades-container">
                        </div>
                </div>
            </aside>
        </div>
    </div>

<script>
    // --- BIẾN TRẠNG THÁI HỆ THỐNG ---
    let balance = 10000.00;
    let currentPrice = 65000.50;
    const payoutRate = 0.82; // 82% lợi nhuận
    const tradeDuration = 10; // Giả lập lệnh 10 giây để kiểm tra nhanh
    let activeTrades = [];

    // Cấu hình mảng dữ liệu biểu đồ
    const maxDataPoints = 30;
    let priceData = Array(maxDataPoints).fill(currentPrice);
    let timeLabels = Array(maxDataPoints).fill('');

    // --- CẤU HÌNH BIỂU ĐỒ AREA (TẠO GRADIENT) ---
    const ctx = document.getElementById('otChart').getContext('2d');
    
    // Tạo màu Gradient cho miền dưới đường line
    const gradientFill = ctx.createLinearGradient(0, 0, 0, 400);
    gradientFill.addColorStop(0, 'rgba(33, 150, 243, 0.4)');
    gradientFill.addColorStop(1, 'rgba(33, 150, 243, 0.0)');

    const chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: timeLabels,
            datasets: [{
                data: priceData,
                borderColor: '#2196f3', // Màu xanh dương chuẩn
                backgroundColor: gradientFill,
                borderWidth: 2,
                fill: true,
                tension: 0.1,
                pointRadius: 0,
                pointHitRadius: 10
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            animation: { duration: 0 },
            scales: {
                x: { display: false },
                y: { 
                    position: 'right', 
                    grid: { color: '#2c313f' }, 
                    ticks: { color: '#8a90a2', font: { size: 11 } }
                }
            },
            plugins: {
                legend: { display: false },
                tooltip: { enabled: false }
            }
        }
    });

    // --- CÁC HÀM CẬP NHẬT GIAO DIỆN ---
    const elBalance = document.getElementById('account-balance');
    const elAmount = document.getElementById('trade-amount');
    const elPayout = document.getElementById('potential-payout');
    const elTradesContainer = document.getElementById('trades-container');
    const elOpenCount = document.getElementById('open-count');

    function formatCurrency(num) {
        return num.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' D';
    }

    function adjustAmount(val) {
        let current = parseInt(elAmount.value) || 0;
        let newVal = current + val;
        if (newVal < 1) newVal = 1;
        elAmount.value = newVal;
        updatePayout();
    }

    function updatePayout() {
        let amt = parseFloat(elAmount.value) || 0;
        elPayout.innerText = '+' + formatCurrency(amt * payoutRate);
    }

    // Lắng nghe sự kiện người dùng tự gõ số tiền
    elAmount.addEventListener('input', updatePayout);

    // --- ĐỘNG CƠ GIÁ THỊ TRƯỜNG ---
    setInterval(() => {
        // Biến động giá random
        const change = (Math.random() * 20 - 10); // +/- 10 giá đơn vị
        currentPrice += change;
        
        priceData.push(currentPrice);
        priceData.shift();
        chart.update();

    }, 1000); // Mỗi 1 giây cập nhật giá 1 lần

    // --- LOGIC KHỚP LỆNH QUYỀN CHỌN THEO THỜI GIAN (FIXED TIME TRADES) ---
    function executeTrade(direction) {
        const amount = parseFloat(elAmount.value);
        if (isNaN(amount) || amount <= 0 || amount > balance) return;

        // Trừ tiền ngay lập tức
        balance -= amount;
        elBalance.innerText = formatCurrency(balance);

        // Tạo đối tượng lưu trữ lệnh
        const trade = {
            id: Date.now(),
            direction: direction,
            entryPrice: currentPrice,
            amount: amount,
            timeLeft: tradeDuration
        };
        
        activeTrades.push(trade);
        renderActiveTrades();

        // Bộ đếm ngược độc lập cho từng lệnh
        const timer = setInterval(() => {
            trade.timeLeft--;
            renderActiveTrades();

            if (trade.timeLeft <= 0) {
                clearInterval(timer);
                resolveTrade(trade);
            }
        }, 1000);
    }

    function renderActiveTrades() {
        elTradesContainer.innerHTML = '';
        elOpenCount.innerText = activeTrades.length;

        activeTrades.forEach(trade => {
            const div = document.createElement('div');
            div.className = 'trade-item';
            const icon = trade.direction === 'UP' ? '<i class="fa-solid fa-arrow-up" style="color:var(--green)"></i>' : '<i class="fa-solid fa-arrow-down" style="color:var(--red)"></i>';
            const statusColor = getStatusColor(trade);

            div.innerHTML = `
                <div style="display: flex; gap: 10px; align-items: center;">
                    ${icon}
                    <span style="color: ${statusColor}">$${trade.amount}</span>
                </div>
                <div class="timer">00:${trade.timeLeft.toString().padStart(2, '0')}</div>
            `;
            elTradesContainer.appendChild(div);
        });
    }

    // Tính toán xem lệnh đang tạm thời lãi hay lỗ để đổi màu hiển thị
    function getStatusColor(trade) {
        if (trade.direction === 'UP') return currentPrice > trade.entryPrice ? 'var(--green)' : 'var(--red)';
        if (trade.direction === 'DOWN') return currentPrice < trade.entryPrice ? 'var(--green)' : 'var(--red)';
        return 'var(--text-muted)';
    }

    // Xử lý kết quả khi hết thời gian
    function resolveTrade(trade) {
        // Xóa lệnh khỏi danh sách đang mở
        activeTrades = activeTrades.filter(t => t.id !== trade.id);
        
        let isWin = false;
        if (trade.direction === 'UP' && currentPrice > trade.entryPrice) isWin = true;
        if (trade.direction === 'DOWN' && currentPrice < trade.entryPrice) isWin = true;

        if (isWin) {
            const profit = trade.amount + (trade.amount * payoutRate);
            balance += profit;
        } 
        // Nếu hòa (currentPrice == entryPrice), thường sẽ hoàn vốn, nhưng để đơn giản ta tính là không cộng tiền lãi, chỉ trả lại vốn.
        else if (currentPrice === trade.entryPrice) {
            balance += trade.amount;
        }

        elBalance.innerText = formatCurrency(balance);
        renderActiveTrades();
    }
</script>
</body>
</html>
