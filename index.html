<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel CS:GO Gacha</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #000000;
            --bg-panel: #111111;
            --primary: #ffffff;
            --border-size: 3px;
            
            /* Tông màu độ hiếm CS:GO chuẩn Pixel */
            --blue: #0055ff;   /* Mil-Spec */
            --purple: #8800ff; /* Restricted */
            --pink: #ff00ff;   /* Classified */
            --red: #ff0000;    /* Covert */
            --gold: #ffaa00;   /* Exceedingly Rare */
            --market-up: #39ff14; /* Neon Green */
            --market-down: #ff003c; /* Neon Red */
        }

        * { 
            box-sizing: border-box; margin: 0; padding: 0; user-select: none;
            font-family: 'Press Start 2P', cursive;
        }

        body {
            background-color: var(--bg-dark); color: var(--primary);
            height: 100vh; width: 100vw; display: flex; flex-direction: column; overflow: hidden;
            background-image: linear-gradient(transparent 50%, rgba(255,255,255,0.05) 50%);
            background-size: 100% 4px;
        }

        /* --- BỘ KHUNG PIXEL --- */
        .pixel-box {
            background-color: var(--bg-panel);
            border: var(--border-size) solid var(--primary);
            box-shadow: 4px 4px 0px rgba(255,255,255,0.2);
            padding: 10px;
        }
        
        .pixel-btn {
            background-color: var(--bg-dark); color: var(--primary);
            border: var(--border-size) solid var(--primary);
            cursor: pointer; text-transform: uppercase;
            font-size: 10px; padding: 12px;
            box-shadow: 3px 3px 0px var(--primary);
            transition: all 0.1s;
        }
        .pixel-btn:active { transform: translate(3px, 3px); box-shadow: 0px 0px 0px transparent; }
        .pixel-btn:disabled { background-color: #333; color: #777; border-color: #555; box-shadow: none; transform: none; cursor: not-allowed; }

        /* --- HEADER & HUD --- */
        header { display: flex; justify-content: space-between; align-items: flex-end; padding: 10px; border-bottom: 2px dashed #555; }
        .title { font-size: 12px; color: var(--gold); text-shadow: 2px 2px 0px #885500; line-height: 1.5;}
        .balance-box { text-align: right; }
        .balance-val { font-size: 14px; color: var(--market-up); text-shadow: 2px 2px 0px #005500; margin-bottom: 6px;}
        .inventory-val { font-size: 8px; color: #aaa; }

        /* --- BIỂU ĐỒ THỊ TRƯỜNG --- */
        .chart-container { height: 28vh; width: 100%; position: relative; padding: 10px; border-bottom: 2px dashed #555; }
        .market-status { position: absolute; top: 15px; left: 15px; z-index: 10; }
        .market-title { font-size: 8px; color: #888; margin-bottom: 8px; }
        .market-multiplier { font-size: 16px; text-shadow: 2px 2px 0px #222; }
        .market-up { color: var(--market-up); }
        .market-down { color: var(--market-down); }

        /* --- KHU VỰC GACHA --- */
        .gacha-panel { padding: 15px 10px; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .result-display {
            min-height: 70px; width: 100%; max-width: 350px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; border: 4px solid #333; background: #000; padding: 10px;
        }
        .result-name { font-size: 10px; line-height: 1.4; margin-bottom: 8px; }
        .result-price { font-size: 8px; color: #fff; }
        .btn-open { width: 100%; max-width: 350px; background-color: var(--gold); color: black; border-color: black; box-shadow: 4px 4px 0px #885500; font-size: 14px; font-weight: bold; }

        /* --- KHO ĐỒ --- */
        .inventory-panel { flex: 1; padding: 10px; overflow-y: auto; }
        .inv-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 8px; color: #888; }
        .btn-sell-all { font-size: 8px; padding: 8px; background: var(--market-down); color: white; border-color: white; box-shadow: 2px 2px 0px white;}
        
        .grid-inventory { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding-bottom: 20px;}
        .item-card {
            background-color: #050505; border: 2px solid white; padding: 8px;
            display: flex; flex-direction: column; justify-content: space-between; gap: 8px;
            box-shadow: 3px 3px 0px #222;
        }
        .item-name { font-size: 8px; line-height: 1.4; word-wrap: break-word; }
        .item-price { font-size: 8px; color: white; }
        .btn-sell-single {
            width: 100%; padding: 8px; font-size: 8px;
            background: transparent; color: white; border: 1px dashed white; cursor: pointer;
        }
        .btn-sell-single:active { background: white; color: black; }

        /* Cuộn màn hình */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: white; }
    </style>
</head>
<body>

    <header>
        <div class="title"><i class="fa-solid fa-box-open"></i> GACHA<br><span style="font-size: 8px; color: #888;">CASE: $2.50</span></div>
        <div class="balance-box">
            <div class="balance-val" id="balance-display">100.00$</div>
            <div class="inventory-val">KHO: <span id="inv-value-display">0.00$</span></div>
        </div>
    </header>

    <div class="chart-container">
        <div class="market-status">
            <div class="market-title">THỊ TRƯỜNG CHUNG</div>
            <div class="market-multiplier market-up" id="market-display">x1.000</div>
        </div>
        <canvas id="marketChart"></canvas>
    </div>

    <div class="gacha-panel">
        <div class="result-display" id="result-box">
            <div style="color: #555; font-size: 8px;">[ CHƯA MỞ RƯƠNG ]</div>
        </div>
        <button class="pixel-btn btn-open" id="btn-open" onclick="openCase()">MỞ NGAY ($2.50)</button>
    </div>

    <div class="inventory-panel">
        <div class="inv-header">
            <span>SỐ LƯỢNG: <span id="inv-count">0</span></span>
            <button class="pixel-btn btn-sell-all" onclick="sellAll()">BÁN HẾT</button>
        </div>
        <div class="grid-inventory" id="inventory-grid">
            </div>
    </div>

<script>
    // --- 1. DỮ LIỆU CỐT LÕI ---
    const CASE_PRICE = 2.50;
    let balance = 100.00;
    let inventory = [];
    let marketMultiplier = 1.000; 

    // Hệ thống Loot Pool chuẩn CS:GO với màu sắc Pixel
    const lootPool = [
        { name: "P250 Sand Dune", color: "var(--blue)", basePrice: 0.10, weight: 79.92 },
        { name: "M4A1-S Cyrex", color: "var(--purple)", basePrice: 1.50, weight: 15.98 },
        { name: "AK-47 Asiimov", color: "var(--pink)", basePrice: 8.50, weight: 3.20 },
        { name: "AWP Dragon Lore", color: "var(--red)", basePrice: 65.00, weight: 0.64 },
        { name: "★ Butterfly Knife", color: "var(--gold)", basePrice: 350.00, weight: 0.26 }
    ];

    // --- 2. CẤU HÌNH BIỂU ĐỒ PIXEL ---
    Chart.defaults.font.family = "'Press Start 2P', cursive";
    Chart.defaults.color = "#aaaaaa";
    
    const ctx = document.getElementById('marketChart').getContext('2d');
    const maxDataPoints = 25;
    let marketData = Array(maxDataPoints).fill(marketMultiplier);

    const chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: Array(maxDataPoints).fill(''),
            datasets: [{
                data: marketData,
                borderColor: '#39ff14',
                borderWidth: 2,
                stepped: true, // Nét đứt bậc thang chuẩn Pixel
                pointRadius: 0
            }]
        },
        options: {
            responsive: true, maintainAspectRatio: false, animation: { duration: 0 },
            layout: { padding: { top: 40 } },
            scales: { x: { display: false }, y: { position: 'right', grid: { color: '#222' }, ticks: { font: { size: 7 } } } },
            plugins: { legend: { display: false }, tooltip: { enabled: false } }
        }
    });

    // --- 3. ĐỘNG CƠ THỊ TRƯỜNG ---
    setInterval(() => {
        const volatility = (Math.random() * 8 - 4) / 100;
        marketMultiplier *= (1 + volatility);
        if (marketMultiplier < 0.1) marketMultiplier = 0.1;

        marketData.push(marketMultiplier);
        marketData.shift();

        const isUp = marketData[maxDataPoints - 1] >= marketData[maxDataPoints - 2];
        chart.data.datasets[0].borderColor = isUp ? '#39ff14' : '#ff003c';
        chart.update();

        const elMarket = document.getElementById('market-display');
        elMarket.innerText = 'x' + marketMultiplier.toFixed(3);
        elMarket.className = `market-multiplier ${isUp ? 'market-up' : 'market-down'}`;

        // Cập nhật giá kho đồ mà không cần render lại toàn bộ HTML
        updateInventoryPrices();
    }, 1500);

    // --- 4. GACHA LOGIC ---
    function rollGacha() {
        let rand = Math.random() * 100;
        let cumulativeWeight = 0;
        for (let i = 0; i < lootPool.length; i++) {
            cumulativeWeight += lootPool[i].weight;
            if (rand <= cumulativeWeight) return lootPool[i];
        }
        return lootPool[0];
    }

    function openCase() {
        if (balance < CASE_PRICE) {
            alert("HẾT TIỀN!"); return;
        }

        balance -= CASE_PRICE;
        updateBalanceUI();
        
        const btn = document.getElementById('btn-open');
        const resultBox = document.getElementById('result-box');
        
        btn.disabled = true;
        btn.innerText = "MỞ...";
        resultBox.style.borderColor = "#333";
        resultBox.innerHTML = `<div style="color: #fff; font-size: 8px;">ĐANG QUAY...</div>`;

        setTimeout(() => {
            const pulled = rollGacha();
            const item = {
                id: Date.now() + Math.floor(Math.random()*1000), // ID duy nhất
                name: pulled.name, color: pulled.color, basePrice: pulled.basePrice
            };
            
            inventory.unshift(item); // Thêm lên đầu mảng
            
            const currentVal = item.basePrice * marketMultiplier;
            resultBox.style.borderColor = item.color;
            resultBox.innerHTML = `
                <div class="result-name" style="color: ${item.color}">${item.name}</div>
                <div class="result-price">GIÁ TT: ${currentVal.toFixed(2)}$</div>
            `;

            renderFullInventory(); // Có đồ mới nên phải vẽ lại 1 lần
            btn.disabled = false;
            btn.innerText = "MỞ NGAY ($2.50)";
        }, 400);
    }

    // --- 5. KHO ĐỒ & UI ---
    function updateBalanceUI() {
        document.getElementById('balance-display').innerText = balance.toFixed(2) + '$';
    }

    // Hàm vẽ lại HTML toàn bộ kho (Chỉ gọi khi Mở hòm hoặc Bán)
    function renderFullInventory() {
        const grid = document.getElementById('inventory-grid');
        grid.innerHTML = '';
        document.getElementById('inv-count').innerText = inventory.length;

        let totalValue = 0;
        inventory.forEach(item => {
            const currentVal = item.basePrice * marketMultiplier;
            totalValue += currentVal;
            
            grid.innerHTML += `
                <div class="item-card" id="card-${item.id}" style="border-top: 4px solid ${item.color};">
                    <div class="item-name" style="color: ${item.color}">${item.name}</div>
                    <div>
                        <div class="item-price" id="price-${item.id}">${currentVal.toFixed(2)}$</div>
                        <button class="btn-sell-single" style="margin-top: 8px;" onclick="sellItem(${item.id})">BÁN NGAY</button>
                    </div>
                </div>
            `;
        });
        document.getElementById('inv-value-display').innerText = totalValue.toFixed(2) + '$';
    }

    // Hàm cập nhật NHẸ chỉ số tiền (Gọi mỗi 1.5s để chống giật màn hình)
    function updateInventoryPrices() {
        let totalValue = 0;
        inventory.forEach(item => {
            const currentVal = item.basePrice * marketMultiplier;
            totalValue += currentVal;
            
            // Chỉ đổi chữ số trong thẻ span, không đụng tới HTML khác
            const priceEl = document.getElementById(`price-${item.id}`);
            if(priceEl) priceEl.innerText = currentVal.toFixed(2) + '$';
        });
        document.getElementById('inv-value-display').innerText = totalValue.toFixed(2) + '$';
    }

    function sellItem(id) {
        const index = inventory.findIndex(i => i.id === id);
        if (index > -1) {
            const item = inventory[index];
            balance += (item.basePrice * marketMultiplier);
            inventory.splice(index, 1);
            updateBalanceUI();
            renderFullInventory();
        }
    }

    function sellAll() {
        if (inventory.length === 0) return;
        let total = 0;
        inventory.forEach(item => total += (item.basePrice * marketMultiplier));
        balance += total;
        inventory = [];
        updateBalanceUI();
        renderFullInventory();
    }

    updateBalanceUI();
</script>
</body>
</html>
