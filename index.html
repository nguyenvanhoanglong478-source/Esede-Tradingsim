<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sàn Giao Dịch Crypto Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* --- ROOT & RESET --- */
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --bg-hover: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --up-color: #10b981;
            --down-color: #ef4444;
            --border: #334155;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
            padding: 20px;
        }

        /* --- BỐ CỤC CHÍNH --- */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* --- HEADER & TỔNG TÀI SẢN --- */
        .header-panel {
            background-color: var(--bg-card);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .net-worth-box h1 { font-size: 28px; color: var(--up-color); margin-top: 5px; }
        .net-worth-box p { color: var(--text-muted); font-size: 14px; text-transform: uppercase; letter-spacing: 1px;}
        .cash-box { text-align: right; }
        .cash-box h2 { font-size: 20px; color: var(--text-main); margin-top: 5px; }

        /* --- HỆ THỐNG TABS --- */
        .tabs {
            display: flex;
            gap: 10px;
            background-color: var(--bg-card);
            padding: 10px;
            border-radius: 12px;
            overflow-x: auto;
        }
        .tabs::-webkit-scrollbar { display: none; }
        .tab-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 10px 20px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .tab-btn:hover { background-color: var(--bg-hover); color: var(--text-main); }
        .tab-btn.active { background-color: var(--accent); color: white; box-shadow: 0 2px 10px rgba(59, 130, 246, 0.3); }

        /* --- KHU VỰC GIAO DỊCH (CHART + PANEL) --- */
        .main-dashboard {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }
        .card {
            background-color: var(--bg-card);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        
        /* Thông tin Coin Đang chọn */
        .active-coin-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
        }
        .active-coin-header h2 { font-size: 24px; }
        .active-coin-header .price { font-size: 28px; font-weight: bold; }
        .price.up { color: var(--up-color); }
        .price.down { color: var(--down-color); }

        /* Biểu đồ */
        .chart-container { width: 100%; height: 300px; position: relative; }

        /* Bảng đặt lệnh */
        .trade-form label { display: block; color: var(--text-muted); margin-bottom: 8px; font-size: 14px; }
        .trade-form input {
            width: 100%;
            background-color: var(--bg-main);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 15px;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        .trade-form input:focus { border-color: var(--accent); }
        
        .btn-group { display: flex; gap: 10px; }
        .btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            color: white;
            transition: transform 0.1s, opacity 0.2s;
        }
        .btn:active { transform: scale(0.96); }
        .btn:hover { opacity: 0.9; }
        .btn-buy { background-color: var(--up-color); }
        .btn-sell { background-color: var(--down-color); }

        .coin-balance {
            background-color: var(--bg-main);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            border: 1px solid var(--border);
        }

        #notification { text-align: center; margin-top: 15px; font-size: 14px; min-height: 20px; }

        /* --- RESPONSIVE CHO ĐIỆN THOẠI --- */
        @media (max-width: 768px) {
            .header-panel { flex-direction: column; align-items: flex-start; gap: 15px; }
            .cash-box { text-align: left; }
            .main-dashboard { grid-template-columns: 1fr; }
            .chart-container { height: 220px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-panel">
        <div class="net-worth-box">
            <p>Tổng Tài Sản (Net Worth)</p>
            <h1 id="total-net-worth">$10,000.00</h1>
        </div>
        <div class="cash-box">
            <p>Tiền Mặt (Khả dụng)</p>
            <h2 id="cash-balance">$10,000.00</h2>
        </div>
    </div>

    <div class="tabs" id="coin-tabs">
        </div>

    <div class="main-dashboard">
        <div class="card">
            <div class="active-coin-header">
                <div>
                    <h2 id="active-coin-name">Bitcoin (BTC)</h2>
                    <p style="color: var(--text-muted); font-size: 14px; margin-top: 5px;">Cập nhật theo thời gian thực</p>
                </div>
                <div class="price up" id="active-coin-price">$0.00</div>
            </div>
            <div class="chart-container">
                <canvas id="mainChart"></canvas>
            </div>
        </div>

        <div class="card">
            <h3 style="margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px;">Đặt Lệnh Nhanh</h3>
            
            <div class="coin-balance">
                <span style="color: var(--text-muted);">Sở hữu:</span>
                <strong id="active-coin-balance">0.00</strong>
            </div>

            <div class="trade-form">
                <label for="trade-amount">Số lượng muốn giao dịch:</label>
                <input type="number" id="trade-amount" value="1" min="0.001" step="0.01">
                
                <div class="btn-group">
                    <button class="btn btn-buy" onclick="executeTrade('BUY')">MUA VÀO</button>
                    <button class="btn btn-sell" onclick="executeTrade('SELL')">BÁN RA</button>
                </div>
            </div>
            <div id="notification"></div>
        </div>
    </div>
</div>

<script>
    // --- QUẢN LÝ DỮ LIỆU CỐT LÕI ---
    let portfolio = {
        cash: 10000.00, // Vốn khởi điểm lớn hơn để dễ mua BTC
    };

    // Cơ sở dữ liệu danh sách các loại tiền điện tử
    const coins = {
        'BTC': { name: 'Bitcoin', symbol: 'BTC', price: 65000, balance: 0, history: [], color: '#f59e0b', icon: 'fa-bitcoin' },
        'ETH': { name: 'Ethereum', symbol: 'ETH', price: 3500, balance: 0, history: [], color: '#627eea', icon: 'fa-brands fa-ethereum' },
        'SOL': { name: 'Solana', symbol: 'SOL', price: 150, balance: 0, history: [], color: '#14f195', icon: 'fa-solid fa-link' },
        'DOGE': { name: 'Dogecoin', symbol: 'DOGE', price: 0.15, balance: 0, history: [], color: '#eab308', icon: 'fa-solid fa-dog' }
    };

    let activeCoinKey = 'BTC'; // Coin đang được chọn để hiển thị
    const maxHistoryPoints = 25; // Số điểm trên biểu đồ
    const timeLabels = Array(maxHistoryPoints).fill(''); 

    // --- CÁC PHẦN TỬ GIAO DIỆN ---
    const elTotalNetWorth = document.getElementById('total-net-worth');
    const elCashBalance = document.getElementById('cash-balance');
    const elTabsContainer = document.getElementById('coin-tabs');
    const elActiveName = document.getElementById('active-coin-name');
    const elActivePrice = document.getElementById('active-coin-price');
    const elActiveBalance = document.getElementById('active-coin-balance');
    const inputAmount = document.getElementById('trade-amount');
    const elNotif = document.getElementById('notification');

    // --- KHỞI TẠO BIỂU ĐỒ (CHART.JS) ---
    const ctx = document.getElementById('mainChart').getContext('2d');
    let chartInstance = new Chart(ctx, {
        type: 'line',
        data: {
            labels: timeLabels,
            datasets: [{
                data: [],
                borderColor: '#3b82f6',
                borderWidth: 2,
                tension: 0.3,
                pointRadius: 0
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            animation: { duration: 0 },
            scales: {
                x: { display: false },
                y: { grid: { color: '#334155' }, ticks: { color: '#94a3b8' } }
            },
            plugins: { legend: { display: false }, tooltip: { enabled: true } }
        }
    });

    // --- HÀM TRỢ GIÚP ---
    function formatMoney(amount) {
        // Tự động định dạng số thập phân tuỳ vào giá trị (VD: DOGE cần nhiều số lẻ hơn BTC)
        let decimals = amount < 1 ? 4 : 2;
        return '$' + amount.toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
    }

    function showNotification(msg, isSuccess) {
        elNotif.innerText = msg;
        elNotif.style.color = isSuccess ? 'var(--up-color)' : 'var(--down-color)';
        setTimeout(() => elNotif.innerText = '', 3000);
    }

    // --- KHỞI TẠO TABS ---
    function renderTabs() {
        elTabsContainer.innerHTML = '';
        Object.keys(coins).forEach(key => {
            const coin = coins[key];
            const btn = document.createElement('button');
            btn.className = `tab-btn ${key === activeCoinKey ? 'active' : ''}`;
            btn.innerHTML = `<i class="${coin.icon}"></i> ${coin.symbol}`;
            btn.onclick = () => switchTab(key);
            elTabsContainer.appendChild(btn);
        });
    }

    function switchTab(key) {
        activeCoinKey = key;
        renderTabs(); // Cập nhật lại màu sắc tab
        updateUI();   // Vẽ lại giao diện theo coin mới
    }

    // --- VÒNG LẶP THỊ TRƯỜNG TỔNG (CHẠY NGẦM CHO TẤT CẢ COIN) ---
    // Khởi tạo lịch sử giá ban đầu cho đỡ trống
    Object.keys(coins).forEach(key => {
        for(let i=0; i<maxHistoryPoints; i++) coins[key].history.push(coins[key].price);
    });

    setInterval(() => {
        let totalCoinsValue = 0;

        // Cập nhật giá cho TOÀN BỘ danh sách coin, dù có đang mở tab đó hay không
        Object.keys(coins).forEach(key => {
            let coin = coins[key];
            // Biến động ngẫu nhiên -2% đến +2.2%
            let change = (Math.random() * 4.2 - 2) / 100;
            coin.price = coin.price * (1 + change);
            
            // Lưu lịch sử
            coin.history.push(coin.price);
            if(coin.history.length > maxHistoryPoints) coin.history.shift();

            // Tính tổng giá trị tài sản
            totalCoinsValue += coin.price * coin.balance;
        });

        // Cập nhật số dư tổng
        elCashBalance.innerText = formatMoney(portfolio.cash);
        elTotalNetWorth.innerText = formatMoney(portfolio.cash + totalCoinsValue);

        // Chỉ cập nhật giao diện chi tiết cho Coin đang được chọn (Tab Active)
        updateUI();
    }, 1500);

    // --- CẬP NHẬT GIAO DIỆN (CHỈ UPDATE COIN ĐANG CHỌN) ---
    let lastPrice = 0;
    function updateUI() {
        const activeCoin = coins[activeCoinKey];
        
        elActiveName.innerText = `${activeCoin.name} (${activeCoin.symbol})`;
        elActivePrice.innerText = formatMoney(activeCoin.price);
        elActiveBalance.innerText = `${activeCoin.balance.toLocaleString()} ${activeCoin.symbol}`;

        // Đổi màu giá tăng/giảm
        if (activeCoin.price >= lastPrice) {
            elActivePrice.className = "price up";
            chartInstance.data.datasets[0].borderColor = "var(--up-color)";
            chartInstance.data.datasets[0].backgroundColor = "rgba(16, 185, 129, 0.1)"; // Màu xanh lá mờ
        } else {
            elActivePrice.className = "price down";
            chartInstance.data.datasets[0].borderColor = "var(--down-color)";
            chartInstance.data.datasets[0].backgroundColor = "rgba(239, 68, 68, 0.1)"; // Màu đỏ mờ
        }
        lastPrice = activeCoin.price;

        // Đổ dữ liệu vào biểu đồ
        chartInstance.data.datasets[0].data = activeCoin.history;
        chartInstance.data.datasets[0].fill = true;
        chartInstance.update();
    }

    // --- XỬ LÝ GIAO DỊCH ---
    function executeTrade(type) {
        const amount = parseFloat(inputAmount.value);
        if (isNaN(amount) || amount <= 0) {
            showNotification("Số lượng không hợp lệ!", false);
            return;
        }

        const activeCoin = coins[activeCoinKey];
        const totalCost = amount * activeCoin.price;

        if (type === 'BUY') {
            if (portfolio.cash >= totalCost) {
                portfolio.cash -= totalCost;
                activeCoin.balance += amount;
                showNotification(`Đã mua ${amount} ${activeCoin.symbol} thành công!`, true);
            } else {
                showNotification("Không đủ tiền mặt!", false);
            }
        } else if (type === 'SELL') {
            if (activeCoin.balance >= amount) {
                portfolio.cash += totalCost;
                activeCoin.balance -= amount;
                showNotification(`Đã bán ${amount} ${activeCoin.symbol} thành công!`, true);
            } else {
                showNotification(`Không đủ ${activeCoin.symbol} để bán!`, false);
            }
        }
        
        // Cập nhật lại ngay lập tức sau khi giao dịch
        elCashBalance.innerText = formatMoney(portfolio.cash);
        updateUI();
    }

    // Khởi chạy lần đầu
    renderTabs();
    updateUI();
</script>
</body>
</html>
