<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sàn Giao Dịch Mô Phỏng Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* --- THIẾT KẾ GIAO DIỆN CHUẨN MÁY TÍNH (DESKTOP) --- */
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .dashboard {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            max-width: 1200px;
            width: 100%;
        }
        .card {
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        h2, h3 {
            margin-top: 0;
            color: #ffffff;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        .stat-box {
            background-color: #2c2c2c;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-title {
            font-size: 13px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .stat-value {
            font-size: 22px;
            font-weight: bold;
            margin-top: 5px;
            color: #4caf50;
            transition: color 0.3s;
        }
        .stat-value.down { color: #f44336; }
        .stat-value.neutral { color: #2196f3; }
        
        .chart-container {
            position: relative;
            width: 100%;
            height: auto;
        }
        canvas {
            background-color: #161616;
            border-radius: 8px;
            padding: 10px;
            width: 100% !important;
        }

        .trade-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .input-group {
            display: flex;
            flex-direction: column;
        }
        label {
            font-size: 14px;
            margin-bottom: 5px;
            color: #aaa;
        }
        input {
            padding: 12px;
            border: 1px solid #444;
            background-color: #121212;
            color: white;
            border-radius: 6px;
            font-size: 16px;
            outline: none;
        }
        input:focus {
            border-color: #2196f3;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 5px;
        }
        button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            color: white;
            transition: transform 0.1s, filter 0.2s;
        }
        button:active { transform: scale(0.98); }
        button:hover { filter: brightness(1.1); }
        .btn-buy { background-color: #4caf50; }
        .btn-sell { background-color: #f44336; }

        .history-list {
            max-height: 220px;
            overflow-y: auto;
            margin-top: 10px;
            font-size: 13px;
        }
        /* Tùy chỉnh thanh cuộn lịch sử */
        .history-list::-webkit-scrollbar {
            width: 6px;
        }
        .history-list::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 3px;
        }
        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #2a2a2a;
        }
        .history-item.buy { color: #4caf50; }
        .history-item.sell { color: #f44336; }
        
        #notification {
            font-size: 14px;
            text-align: center;
            min-height: 20px;
            font-weight: 500;
        }

        /* --- THIẾT KẾ WEB ĐÁP ỨNG CHO ĐIỆN THOẠI (RESPONSIVE) --- */
        @media screen and (max-width: 768px) {
            body {
                padding: 10px;
            }
            .dashboard {
                /* Đổi cấu trúc từ 2 cột nằm ngang sang 1 cột dọc xếp chồng */
                grid-template-columns: 1fr;
                gap: 15px;
            }
            .stat-grid {
                /* Xếp các ô thông số thành cột dọc để không bị tràn chữ */
                grid-template-columns: 1fr;
                gap: 10px;
            }
            .stat-box {
                padding: 10px;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            .stat-value {
                margin-top: 0;
                font-size: 18px;
            }
            .card {
                padding: 15px;
            }
            .btn-group {
                /* Nút Mua và Bán xếp dọc để ngón tay dễ bấm chính xác */
                flex-direction: column;
                gap: 10px;
            }
            button {
                padding: 12px;
            }
        }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="card">
        <h2>Tổng quan Thị trường (Mã: V-COIN)</h2>
        
        <div class="stat-grid">
            <div class="stat-box">
                <div class="stat-title">Giá Hiện Tại</div>
                <div class="stat-value" id="current-price">$100.00</div>
            </div>
            <div class="stat-box">
                <div class="stat-title">Tổng Tài Sản</div>
                <div class="stat-value neutral" id="net-worth">$1,000.00</div>
            </div>
            <div class="stat-box">
                <div class="stat-title">Lợi Nhuận (P&L)</div>
                <div class="stat-value neutral" id="profit-loss">$0.00</div>
            </div>
        </div>

        <div class="chart-container">
            <canvas id="priceChart" height="180"></canvas>
        </div>
    </div>

    <div class="card">
        <h3>Bảng Đặt Lệnh</h3>
        
        <div class="stat-box" style="margin-bottom: 15px; display: block; text-align: left;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                <span class="stat-title">Tiền mặt (USD):</span>
                <strong id="balance" style="color: white; font-size: 16px;">$1,000.00</strong>
            </div>
            <div style="display: flex; justify-content: space-between;">
                <span class="stat-title">Đang sở hữu:</span>
                <strong id="assets" style="color: white; font-size: 16px;">0.00 V-COIN</strong>
            </div>
        </div>

        <div class="trade-panel">
            <div class="input-group">
                <label for="quantity">Số lượng muốn giao dịch:</label>
                <input type="number" id="quantity" value="1" min="0.01" step="0.01">
            </div>
            
            <div class="btn-group">
                <button class="btn-buy" onclick="executeTrade('BUY')">MUA VÀO</button>
                <button class="btn-sell" onclick="executeTrade('SELL')">BÁN RA</button>
            </div>
            <div id="notification"></div>
        </div>

        <h3 style="margin-top: 25px;">Lịch sử Giao dịch</h3>
        <div class="history-list" id="history-log">
            </div>
    </div>
</div>

<script>
    // --- KHỞI TẠO BIẾN TRẠNG THÁI HỆ THỐNG ---
    let balance = 1000.00;
    let assetsOwned = 0.00;
    let currentPrice = 100.00;
    const initialBalance = 1000.00;

    // Quản lý mảng dữ liệu phục vụ vẽ đồ thị
    let timeLabels = [];
    let priceData = [];
    const maxDataPoints = 20; // Giới hạn số điểm hiển thị trên màn hình

    // Khai báo các con trỏ trỏ tới phần tử DOM HTML
    const elPrice = document.getElementById('current-price');
    const elBalance = document.getElementById('balance');
    const elAssets = document.getElementById('assets');
    const elNetWorth = document.getElementById('net-worth');
    const elProfitLoss = document.getElementById('profit-loss');
    const elNotif = document.getElementById('notification');
    const elHistory = document.getElementById('history-log');
    const inputQty = document.getElementById('quantity');

    // --- CẤU HÌNH BIỂU ĐỒ REAL-TIME (Sử dụng cấu trúc đối tượng Chart.js) ---
    const ctx = document.getElementById('priceChart').getContext('2d');
    const priceChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: timeLabels,
            datasets: [{
                label: 'Giá V-COIN ($)',
                data: priceData,
                borderColor: '#4caf50',
                backgroundColor: 'rgba(76, 175, 80, 0.05)',
                borderWidth: 2,
                fill: true,
                tension: 0.2,
                pointRadius: 0
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            animation: { duration: 0 }, // Tắt hiệu ứng mượt để tối ưu hiệu năng cập nhật liên tục
            scales: {
                x: { display: false },
                y: { grid: { color: '#252525' }, ticks: { color: '#888' } }
            },
            plugins: { legend: { display: false } }
        }
    });

    // --- HÀM TRỢ GIÚP LOGIC ---
    function formatMoney(num) {
        return '$' + parseFloat(num).toFixed(2);
    }

    function getCurrentTime() {
        const now = new Date();
        const hrs = String(now.getHours()).padStart(2, '0');
        const mins = String(now.getMinutes()).padStart(2, '0');
        const secs = String(now.getSeconds()).padStart(2, '0');
        return `${hrs}:${mins}:${secs}`;
    }

    function showNotif(msg, color) {
        elNotif.innerText = msg;
        elNotif.style.color = color;
    }

    // Thêm một hàng ghi nhận nhật ký giao dịch mới lên đầu danh sách
    function addHistoryRow(type, qty, price) {
        const row = document.createElement('div');
        row.className = `history-item ${type.toLowerCase()}`;
        
        const timeStr = getCurrentTime();
        const actionStr = type === 'BUY' ? 'Mua' : 'Bán';
        const totalStr = formatMoney(qty * price);

        row.innerHTML = `
            <span>[${timeStr}] ${actionStr} ${qty.toFixed(2)} V-COIN</span>
            <span>@ ${formatMoney(price)} = ${totalStr}</span>
        `;
        elHistory.prepend(row);
    }

    // Hàm cập nhật trạng thái dữ liệu lên giao diện người dùng
    function updateUI(oldPrice) {
        elBalance.innerText = formatMoney(balance);
        elAssets.innerText = assetsOwned.toFixed(2) + " V-COIN";
        elPrice.innerText = formatMoney(currentPrice);

        // Thuật toán tính Tổng tài sản (Net Worth = Tiền mặt + Giá trị Coin quy đổi)
        const netWorth = balance + (assetsOwned * currentPrice);
        const profitLoss = netWorth - initialBalance;

        elNetWorth.innerText = formatMoney(netWorth);
        elProfitLoss.innerText = (profitLoss >= 0 ? '+' : '') + formatMoney(profitLoss);

        // Kiểm tra điều kiện đổi màu sắc hiển thị (Xanh khi tăng / Đỏ khi giảm)
        if (currentPrice >= oldPrice) {
            elPrice.className = "stat-value";
            priceChart.data.datasets[0].borderColor = '#4caf50';
        } else {
            elPrice.className = "stat-value down";
            priceChart.data.datasets[0].borderColor = '#f44336';
        }

        if (profitLoss >= 0) {
            elProfitLoss.className = "stat-value";
        } else {
            elProfitLoss.className = "stat-value down";
        }
    }

    // --- ĐỘNG CƠ MÔ PHỎNG BIẾN ĐỘNG THỊ TRƯỜNG (Chạy lặp lại sau mỗi 1.5 giây) ---
    setInterval(() => {
        const oldPrice = currentPrice;
        
        // Tạo biến động ngẫu nhiên có biên độ từ -3.0% đến +3.5%
        const volatility = (Math.random() * 6.5 - 3) / 100;
        currentPrice = currentPrice + (currentPrice * volatility);
        
        // Cơ chế chặn sàn giá thấp nhất không âm (ngưỡng an toàn tối thiểu $1.00)
        if (currentPrice < 1) currentPrice = 1;

        // Cập nhật cấu trúc mảng dữ liệu biểu đồ
        timeLabels.push(getCurrentTime());
        priceData.push(currentPrice);

        // Sử dụng cấu trúc hàng đợi (Queue): Nếu vượt quá số điểm quy định, xóa điểm cũ nhất ở đầu mảng
        if (priceData.length > maxDataPoints) {
            timeLabels.shift();
            priceData.shift();
        }
        
        priceChart.update();
        updateUI(oldPrice);
    }, 1500);

    // --- KHỐI LOGIC XỬ LÝ KHỚP LỆNH MUA / BÁN ---
    function executeTrade(type) {
        const qty = parseFloat(inputQty.value);
        
        // Kiểm tra tính hợp lệ của dữ liệu đầu vào (phải là số dương)
        if (isNaN(qty) || qty <= 0) {
            showNotif("Số lượng nhập vào không hợp lệ!", "#f44336");
            return;
        }

        const totalCost = qty * currentPrice;

        if (type === 'BUY') {
            // Nhánh xử lý lệnh mua: Kiểm tra số dư tiền mặt có đủ không
            if (balance >= totalCost) {
                balance -= totalCost;
                assetsOwned += qty;
                addHistoryRow('BUY', qty, currentPrice);
                showNotif(`Khớp lệnh MUA: -${formatMoney(totalCost)}`, "#4caf50");
            } else {
                showNotif("Tài khoản không đủ số dư tiền mặt!", "#f44336");
            }
        } 
        else if (type === 'SELL') {
            // Nhánh xử lý lệnh bán: Kiểm tra số lượng tài sản nắm giữ có đủ để khớp lệnh không
            if (assetsOwned >= qty) {
                balance += totalCost;
                assetsOwned -= qty;
                addHistoryRow('SELL', qty, currentPrice);
                showNotif(`Khớp lệnh BÁN: +${formatMoney(totalCost)}`, "#4caf50");
            } else {
                showNotif("Số lượng V-COIN sở hữu không đủ để bán!", "#f44336");
            }
        }
        updateUI(currentPrice);
    }
</script>
</body>
</html>
